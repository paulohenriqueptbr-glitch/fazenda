<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f6b5b">
    <title>Controle Leite</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <span class="eyebrow">Fazenda online</span>
          <h1>Controle Leite</h1>
        </div>
        <span id="syncStatus" class="status">Local</span>
      </header>

      <section class="summary-grid" aria-label="Resumo">
        <article class="summary primary">
          <span>Produção de hoje</span>
          <strong id="todayTotal">0 L</strong>
          <small id="todayValue">R$ 0,00</small>
        </article>
        <article class="summary">
          <span>Mês atual</span>
          <strong id="monthTotal">0 L</strong>
          <small id="monthValue">R$ 0,00</small>
        </article>
        <article class="summary">
          <span>Animais</span>
          <strong id="animalTotal">0</strong>
          <small id="lactatingTotal">0 em lactação</small>
        </article>
      </section>

      <nav class="tabs" aria-label="Seções">
        <button class="tab active" type="button" data-tab="milk">Leite</button>
        <button class="tab" type="button" data-tab="animals">Animais</button>
        <button class="tab" type="button" data-tab="stock">Estoque</button>
        <button class="tab" type="button" data-tab="cows">Vacas</button>
        <button class="tab" type="button" data-tab="lactation">Lactação</button>
        <button class="tab" type="button" data-tab="breeding">Reprodução</button>
        <button class="tab" type="button" data-tab="medication">Medicação</button>
      </nav>

      <section id="milk" class="panel active">
        <form id="milkForm" class="form-grid">
          <label for="milkDate">Data</label>
          <input id="milkDate" type="date" required>

          <label for="liters">Litros</label>
          <input id="liters" type="number" min="0" step="0.1" inputmode="decimal" placeholder="Ex.: 28" required>

          <label for="price">Valor do litro</label>
          <input id="price" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Ex.: 2,40" required>

          <button type="submit">Salvar produção</button>
        </form>

        <div class="section-title">
          <h2>Histórico</h2>
          <button id="refreshButton" class="ghost" type="button">Atualizar</button>
        </div>
        <div id="historyList" class="list"></div>
      </section>

      <section id="animals" class="panel">
        <form id="animalForm" class="form-grid">
          <label for="animalName">Identificação</label>
          <input id="animalName" type="text" placeholder="Ex.: BOV-0001" required>

          <label for="animalType">Tipo</label>
          <select id="animalType">
            <option>Bovino de Leite</option>
            <option>Caprino</option>
            <option>Ovino</option>
            <option>Suíno</option>
          </select>

          <label for="animalStatus">Status</label>
          <select id="animalStatus">
            <option>Em lactação</option>
            <option>Para engorda</option>
            <option>Disponível para venda</option>
          </select>

          <button type="submit">Cadastrar animal</button>
        </form>

        <div class="section-title">
          <h2>Rebanho</h2>
        </div>
        <div id="animalList" class="list"></div>
      </section>

      <section id="cows" class="panel">
        <form id="cowForm" class="form-grid">
          <label for="cowName">Nome</label>
          <input id="cowName" type="text" placeholder="Ex.: Bovina 001" required>
          <label for="cowBreed">Raça</label>
          <input id="cowBreed" type="text" placeholder="Ex.: Holandesa" required>
          <label for="cowBirth">Data de nascimento</label>
          <input id="cowBirth" type="date" required>
          <button type="submit">Cadastrar vaca</button>
        </form>
        <div class="section-title"><h2>Rebanho</h2></div>
        <div id="cowList" class="list"></div>
      </section>

      <section id="lactation" class="panel">
        <form id="lactationForm" class="form-grid">
          <label for="lactCowId">Vaca</label>
          <select id="lactCowId"></select>
          <label for="lactStart">Início</label>
          <input id="lactStart" type="date" required>
          <label for="lactEnd">Fim</label>
          <input id="lactEnd" type="date">
          <label for="lactLiters">Litros por dia</label>
          <input id="lactLiters" type="number" min="0" step="0.1" required>
          <button type="submit">Registrar lactação</button>
        </form>
        <div class="section-title"><h2>Lactações</h2></div>
        <div id="lactationList" class="list"></div>
      </section>

      <section id="breeding" class="panel">
        <form id="breedingForm" class="form-grid">
          <label for="breedCowId">Vaca</label>
          <select id="breedCowId"></select>
          <label for="inseminationDate">Data da inseminação</label>
          <input id="inseminationDate" type="date" required>
          <label for="expectedCalving">Parto previsto</label>
          <input id="expectedCalving" type="date" required>
          <button type="submit">Registrar reprodução</button>
        </form>
        <div class="section-title"><h2>Reproduções</h2></div>
        <div id="breedingList" class="list"></div>
      </section>

      <section id="medication" class="panel">
        <form id="medicationForm" class="form-grid">
          <label for="medCowId">Vaca</label>
          <select id="medCowId"></select>
          <label for="medName">Medicamento</label>
          <input id="medName" type="text" placeholder="Ex.: Vitamina A" required>
          <label for="medDosage">Dosagem</label>
          <input id="medDosage" type="text" placeholder="Ex.: 5ml" required>
          <label for="medDate">Data de aplicação</label>
          <input id="medDate" type="date" required>
          <button type="submit">Registrar medicação</button>
        </form>
        <div class="section-title"><h2>Medicações</h2></div>
        <div id="medicationList" class="list"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
